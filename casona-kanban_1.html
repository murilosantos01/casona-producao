<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casona Açaí · Produção</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --roxo:#7C3AED;--roxo2:#A855F7;--roxo-l:#EDE9FE;--roxo-xl:#F5F3FF;
  --bg:#F5F3FF;--white:#fff;--bd:#E4E0F5;--bd2:#C9C2ED;
  --text:#1E1B4B;--t2:#4B5563;--muted:#9CA3AF;
  --n1:#7C3AED;--n1b:#EDE9FE;--n2:#D97706;--n2b:#FEF3C7;--n3:#059669;--n3b:#D1FAE5;
  --sh:0 1px 3px rgba(0,0,0,.07);--sh2:0 4px 16px rgba(124,58,237,.13);
  --r:13px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
header{background:var(--white);border-bottom:1.5px solid var(--bd);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
.logo{display:flex;align-items:center;gap:9px;font-family:'Syne',sans-serif;font-weight:900;font-size:16px;color:var(--text)}
.logo-ico{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--roxo),var(--roxo2));display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(124,58,237,.3)}
.hright{display:flex;align-items:center;gap:8px}
.nav-tabs{display:flex;background:var(--bg);border-radius:20px;padding:3px;gap:2px}
.ntab{padding:6px 16px;border-radius:17px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s}
.ntab.active{background:var(--white);color:var(--roxo);box-shadow:var(--sh);font-weight:700}
.btn-new{padding:8px 16px;border-radius:20px;border:none;background:linear-gradient(135deg,var(--roxo),var(--roxo2));color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(124,58,237,.3);transition:all .15s;white-space:nowrap}
.btn-new:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(124,58,237,.4)}

/* SPRINT BAR */
.sbar{background:var(--white);border-bottom:1.5px solid var(--bd);padding:9px 24px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.spill{display:inline-flex;align-items:center;gap:4px;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700}
.sp-ok{background:#D1FAE5;color:#065F46}.sp-warn{background:#FFE4E6;color:#9F1239}
.sp-info{background:var(--roxo-l);color:var(--roxo)}.sp-n{background:#F1F5F9;color:#475569}
.ptrack{width:90px;height:5px;background:#E5E7EB;border-radius:99px;overflow:hidden;display:inline-block}
.pfill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--roxo),var(--roxo2));transition:width .4s}

/* FILTER BAR */
.fbar{background:var(--white);border-bottom:1.5px solid var(--bd);padding:9px 24px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.flabel{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.fbtn{padding:5px 13px;border-radius:20px;border:1.5px solid var(--bd);background:var(--white);color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.fbtn:hover{border-color:var(--roxo);color:var(--roxo)}
.fbtn.active{background:var(--text);color:#fff;border-color:var(--text)}
.sep{width:1px;height:18px;background:var(--bd);margin:0 2px}

/* MONTH TABS */
.mbar{padding:14px 24px 0;display:flex;gap:6px}
.mtab{padding:7px 20px;border-radius:20px 20px 0 0;border:1.5px solid var(--bd);border-bottom:none;background:var(--white);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.mtab.active{background:var(--roxo);color:#fff;border-color:var(--roxo)}

/* VIEWS */
.view{display:none}.view.active{display:block}

/* KANBAN */
.kwrap{overflow-x:auto;padding:16px 24px 40px}
.kboard{display:flex;gap:11px;align-items:flex-start;min-width:max-content}
.col{width:252px;background:var(--white);border-radius:var(--r);border:1.5px solid var(--bd);box-shadow:var(--sh);overflow:hidden}
.col-hd{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid var(--bd)}
.col-dot{width:8px;height:8px;border-radius:50%;margin-right:7px;flex-shrink:0}
.col-name{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;display:flex;align-items:center}
.col-cnt{min-width:20px;height:20px;border-radius:99px;background:var(--bg);color:var(--muted);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px}
.col-body{padding:9px;min-height:50px}

/* CARD */
.card{background:var(--bg);border:1.5px solid var(--bd);border-radius:10px;padding:11px;margin-bottom:7px;cursor:pointer;transition:all .15s;position:relative}
.card:hover{border-color:var(--roxo);box-shadow:var(--sh2);transform:translateY(-1px)}
.card-tipo-dot{position:absolute;top:10px;right:10px;width:8px;height:8px;border-radius:50%}
.card-title{font-weight:700;font-size:13px;color:var(--text);margin-bottom:3px;line-height:1.35;padding-right:14px}
.card-obj{font-size:11px;color:var(--muted);margin-bottom:7px}
.card-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.tn1{background:var(--n1b);color:var(--n1)}.tn2{background:var(--n2b);color:var(--n2)}.tn3{background:var(--n3b);color:var(--n3)}
.tmonth{background:#E0F2FE;color:#0369A1}
.tdl-ok{background:#F1F5F9;color:#475569}.tdl-w{background:#FEF3C7;color:#92400E}.tdl-late{background:#FFE4E6;color:#9F1239}
.ttipo{background:#F3F4F6;color:#374151}
.card-desc{font-size:11px;color:var(--muted);margin-top:7px;font-style:italic;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.btn-col-add{width:100%;padding:9px;background:none;border:1.5px dashed var(--bd);border-radius:9px;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:3px;transition:all .15s}
.btn-col-add:hover{border-color:var(--roxo);color:var(--roxo);background:var(--roxo-xl)}

/* CALENDAR */
.calwrap{padding:20px 24px 48px;max-width:1100px}
.calnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.cal-month-title{font-family:'Syne',sans-serif;font-weight:900;font-size:22px;color:var(--text)}
.calnav-btns{display:flex;gap:6px;align-items:center}
.cnbtn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--bd);background:var(--white);color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.cnbtn:hover{border-color:var(--roxo);color:var(--roxo)}
.cnbtn.active-special{background:var(--roxo-l);color:var(--roxo);border-color:var(--roxo)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.dow{text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:6px 0;text-transform:uppercase;letter-spacing:.05em}
.cday{background:var(--white);border:1.5px solid var(--bd);border-radius:11px;min-height:105px;padding:8px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .15s}
.cday:hover{border-color:var(--bd2)}
.cday.today{border-color:var(--roxo);border-width:2px}
.cday.other-m{opacity:.35;pointer-events:none}
.cday-num{font-family:'Syne',sans-serif;font-weight:800;font-size:13px;color:var(--text);margin-bottom:5px;line-height:1}
.cday.today .cday-num{background:var(--roxo);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px}
.cday-sbar{position:absolute;top:0;left:0;right:0;height:4px}
.cday-slabel{font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.cvchip{font-size:10px;font-weight:600;padding:2px 6px;border-radius:5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;cursor:pointer;display:block}
.cvchip:hover{opacity:.75}
.cday-more{font-size:10px;color:var(--muted);font-weight:600;margin-top:1px}
.btn-add-day{position:absolute;bottom:6px;right:6px;width:20px;height:20px;border-radius:50%;background:var(--roxo-l);color:var(--roxo);border:none;font-size:15px;line-height:1;cursor:pointer;display:none;align-items:center;justify-content:center;font-weight:700;transition:all .15s}
.cday:hover .btn-add-day{display:flex}
.btn-add-day:hover{background:var(--roxo);color:#fff}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
.overlay.open{display:flex}
.modal{background:var(--white);border-radius:20px;padding:28px;width:460px;max-width:95vw;max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.22);animation:min .2s ease}
@keyframes min{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.mtitle{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--text)}
.mclose{background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;line-height:1;padding:2px 6px;border-radius:6px}
.mclose:hover{background:var(--bg);color:var(--text)}
.fg{margin-bottom:15px}
.flb{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.fi,.fs,.fta{width:100%;padding:10px 13px;border:1.5px solid var(--bd);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--white);outline:none;transition:border-color .15s;appearance:none}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--roxo);box-shadow:0 0 0 3px rgba(124,58,237,.1)}
.fta{resize:vertical;min-height:76px;line-height:1.5}
.frow{display:flex;gap:11px}.frow .fg{flex:1}
.color-opts{display:flex;gap:8px;flex-wrap:wrap;padding:4px 0}
.copt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;flex-shrink:0}
.copt.sel{border-color:var(--text);transform:scale(1.15)}
.mactions{display:flex;gap:9px;margin-top:22px}
.btn{padding:11px 20px;border-radius:12px;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;transition:all .15s}
.btn-p{background:linear-gradient(135deg,var(--roxo),var(--roxo2));color:#fff;flex:2}
.btn-p:hover{opacity:.9;transform:translateY(-1px)}
.btn-s{background:var(--bg);color:var(--t2);border:1.5px solid var(--bd);flex:1}
.btn-d{background:#FFE4E6;color:#9F1239;border:1.5px solid #FECACA}
.btn-d:hover{background:#FECACA}

/* SPECIAL MODAL */
.smod{width:400px}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:11px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;max-width:280px}
.toast.show{opacity:1;transform:translateY(0)}

/* LOADING */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;color:var(--muted)}
.spinner{width:34px;height:34px;border:3px solid var(--bd);border-top-color:var(--roxo);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* LEGEND */
.cal-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--t2)}
.leg-dot{width:10px;height:10px;border-radius:50%}
.leg-bar{width:20px;height:4px;border-radius:2px}

@media(max-width:600px){
  .kwrap{padding:12px 10px 40px}
  .calwrap{padding:14px 10px 40px}
  .sbar{gap:8px}.hright{gap:5px}
  .nav-tabs{display:none}
  .fbar{padding:8px 12px}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-ico">🎥</div>
    Casona · Produção
  </div>
  <div class="hright">
    <div class="nav-tabs">
      <button class="ntab active" onclick="showView('kanban')">Kanban</button>
      <button class="ntab" onclick="showView('calendar')">Calendário</button>
    </div>
    <button class="btn-new" onclick="openVideoModal()">+ Novo vídeo</button>
  </div>
</header>

<!-- SPRINT BAR -->
<div class="sbar" id="sbar">
  <div class="loading-screen" style="padding:6px 0;flex-direction:row;gap:10px"><div class="spinner" style="width:18px;height:18px;margin:0"></div><span style="font-size:13px">Carregando…</span></div>
</div>

<!-- MONTH TABS (kanban) -->
<div class="mbar" id="mbar" style="display:none">
  <button class="mtab active" onclick="setMonth('Jun')" id="mt-Jun">Junho</button>
  <button class="mtab" onclick="setMonth('Jul')" id="mt-Jul">Julho</button>
</div>

<!-- FILTER BAR -->
<div class="fbar" id="fbar" style="display:none">
  <span class="flabel">Nível</span>
  <button class="fbtn active" onclick="setLevel('todos')" id="lv-todos">Todos</button>
  <button class="fbtn" onclick="setLevel('1')" id="lv-1">🎬 N1</button>
  <button class="fbtn" onclick="setLevel('2')" id="lv-2">⚡ N2</button>
  <button class="fbtn" onclick="setLevel('3')" id="lv-3">🤖 N3</button>
  <div class="sep"></div>
  <span class="flabel">Tipo</span>
  <button class="fbtn active" onclick="setTipo('todos')" id="tp-todos">Todos</button>
  <button class="fbtn" onclick="setTipo('Reels')" id="tp-Reels">🎞 Reels</button>
  <button class="fbtn" onclick="setTipo('Story')" id="tp-Story">📱 Story</button>
  <button class="fbtn" onclick="setTipo('Feed')" id="tp-Feed">🖼 Feed</button>
</div>

<!-- KANBAN VIEW -->
<div class="view active" id="view-kanban">
  <div class="kwrap"><div class="kboard" id="kboard">
    <div class="loading-screen"><div class="spinner"></div>Carregando…</div>
  </div></div>
</div>

<!-- CALENDAR VIEW -->
<div class="view" id="view-calendar">
  <div class="calwrap">
    <div class="calnav">
      <span class="cal-month-title" id="cal-title"></span>
      <div class="calnav-btns">
        <button class="cnbtn" onclick="calPrev()">← Anterior</button>
        <button class="cnbtn" onclick="calToday()">Hoje</button>
        <button class="cnbtn" onclick="calNext()">Próximo →</button>
        <button class="cnbtn" id="btn-special" onclick="openSpecialModal()">🎉 Data especial</button>
      </div>
    </div>
    <div class="cal-legend" id="cal-legend"></div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
</div>

<!-- VIDEO MODAL -->
<div class="overlay" id="ov-video">
  <div class="modal">
    <div class="mhead">
      <span class="mtitle" id="vm-title">Novo vídeo</span>
      <button class="mclose" onclick="closeVideoModal()">✕</button>
    </div>
    <div class="fg"><label class="flb">Título *</label><input class="fi" id="vf-titulo" placeholder="Ex: Brasilidade do açaí com tapioca"/></div>
    <div class="fg"><label class="flb">Objetivo</label><input class="fi" id="vf-objetivo" placeholder="Ex: Engajamento, alcance, agrado ao franqueado…"/></div>
    <div class="fg"><label class="flb">Descrição / briefing</label><textarea class="fta" id="vf-descricao" placeholder="Contexto, referências, o que precisa aparecer no vídeo…"></textarea></div>
    <div class="frow">
      <div class="fg"><label class="flb">Nível</label>
        <select class="fs" id="vf-nivel">
          <option value="1">🎬 N1 · Roteirizado</option>
          <option value="2">⚡ N2 · Meme / Trend</option>
          <option value="3">🤖 N3 · IA / Imagem</option>
        </select>
      </div>
      <div class="fg"><label class="flb">Tipo</label>
        <select class="fs" id="vf-tipo">
          <option>Reels</option><option>Story</option><option>Feed</option>
        </select>
      </div>
    </div>
    <div class="frow">
      <div class="fg"><label class="flb">Mês</label>
        <select class="fs" id="vf-mes">
          <option value="Jun">Junho</option><option value="Jul">Julho</option>
        </select>
      </div>
      <div class="fg"><label class="flb">Status</label>
        <select class="fs" id="vf-status">
          <option>Backlog</option><option>Em produção</option>
          <option>Aguarda aprovação</option><option>Em ajuste</option><option>Publicado</option>
        </select>
      </div>
    </div>
    <div class="fg"><label class="flb">Deadline (data de publicação)</label><input class="fi" type="date" id="vf-deadline"/></div>
    <div class="mactions">
      <button class="btn btn-d" id="vbtn-del" onclick="deleteVideo()" style="display:none">Excluir</button>
      <button class="btn btn-s" onclick="closeVideoModal()">Cancelar</button>
      <button class="btn btn-p" onclick="saveVideo()">Salvar vídeo</button>
    </div>
  </div>
</div>

<!-- SPECIAL DATE MODAL -->
<div class="overlay" id="ov-special">
  <div class="modal smod">
    <div class="mhead">
      <span class="mtitle" id="sm-title">Nova data especial</span>
      <button class="mclose" onclick="closeSpecialModal()">✕</button>
    </div>
    <div class="fg"><label class="flb">Data *</label><input class="fi" type="date" id="sf-data"/></div>
    <div class="fg"><label class="flb">Título / Descrição *</label><input class="fi" id="sf-titulo" placeholder="Ex: Dia dos Namorados, Aniversário Casona…"/></div>
    <div class="fg"><label class="flb">Cor</label>
      <div class="color-opts" id="color-opts"></div>
    </div>
    <div class="mactions">
      <button class="btn btn-d" id="sbtn-del" onclick="deleteSpecial()" style="display:none">Excluir</button>
      <button class="btn btn-s" onclick="closeSpecialModal()">Cancelar</button>
      <button class="btn btn-p" onclick="saveSpecial()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL = 'https://lwhovmhhfqngzjlztfea.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3aG92bWhoZnFuZ3pqbHp0ZmVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMjYxMTgsImV4cCI6MjA5NDgwMjExOH0.GG0Hbyc1JeDLB6f3SrQSLsTCsBdhuLI1R_U7A-IxYlE';

const STATUSES = ['Backlog','Em produção','Aguarda aprovação','Em ajuste','Publicado'];
const S_COLORS = {
  'Backlog':'#94A3B8','Em produção':'#D97706',
  'Aguarda aprovação':'#2563EB','Em ajuste':'#DC2626','Publicado':'#059669'
};
const TIPO_COLORS = {'Reels':'#7C3AED','Story':'#DB2777','Feed':'#0369A1'};
const SPECIAL_COLORS = ['#7C3AED','#DB2777','#D97706','#059669','#2563EB','#DC2626','#0891B2','#65A30D','#EA580C','#9333EA'];

let videos=[], specials=[], currentMonth='Jun', currentLevel='todos', currentTipo='todos';
let currentView='kanban', calYear, calMonth, editingVideoId=null, editingSpecialId=null;
let selectedColor = SPECIAL_COLORS[0];

// ── API ──
async function api(method, path, body){
  const opts={method,headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'}};
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(SB_URL+'/rest/v1/'+path,opts);
  const t=await r.text();
  if(!r.ok) throw new Error(t);
  return t?JSON.parse(t):null;
}

async function load(){
  try{
    const [v,s]=await Promise.all([
      api('GET','videos?order=created_at.asc'),
      api('GET','datas_especiais?order=data.asc')
    ]);
    videos=v||[]; specials=s||[];
    render();
  }catch(e){console.error(e);toast('Erro ao carregar dados');}
}

// ── RENDER ──
function render(){
  renderSprintBar();
  if(currentView==='kanban') renderKanban();
  else renderCalendar();
}

function renderSprintBar(){
  const mv=videos.filter(v=>v.mes===currentMonth);
  const total=mv.length, pub=mv.filter(v=>v.status==='Publicado').length;
  const n1=mv.filter(v=>v.nivel==1).length;
  const pct=Math.min(100,Math.round((pub/8)*100));
  document.getElementById('sbar').innerHTML=`
    <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:var(--text)">Sprint ${currentMonth}</span>
    <span class="spill ${n1>=3?'sp-ok':'sp-warn'}">🎬 N1: ${n1}/3 ${n1>=3?'✓':'⚠'}</span>
    <span class="spill sp-info">${total}/8 vídeos</span>
    <span style="display:inline-flex;align-items:center;gap:7px">
      <span class="ptrack"><span class="pfill" style="width:${pct}%"></span></span>
      <span style="font-size:11px;color:var(--muted);font-weight:600">${pub} publicados</span>
    </span>
  `;
}

// ── KANBAN ──
function renderKanban(){
  const vids=videos.filter(v=>{
    if(v.mes!==currentMonth) return false;
    if(currentLevel!=='todos'&&String(v.nivel)!==currentLevel) return false;
    if(currentTipo!=='todos'&&v.tipo!==currentTipo) return false;
    return true;
  });
  document.getElementById('kboard').innerHTML=STATUSES.map(st=>{
    const sv=vids.filter(v=>v.status===st);
    return`<div class="col">
      <div class="col-hd">
        <span class="col-name"><span class="col-dot" style="background:${S_COLORS[st]}"></span>${st}</span>
        <span class="col-cnt">${sv.length}</span>
      </div>
      <div class="col-body">
        ${sv.length?sv.map(cardHTML).join(''):'<div style="text-align:center;padding:18px 8px;font-size:12px;color:var(--muted)">Vazio</div>'}
        <button class="btn-col-add" onclick="openVideoModal(null,'${st}')">+ Adicionar aqui</button>
      </div>
    </div>`;
  }).join('');
}

function cardHTML(v){
  const le={1:'🎬 N1',2:'⚡ N2',3:'🤖 N3'}[v.nivel];
  const lc={1:'tn1',2:'tn2',3:'tn3'}[v.nivel];
  const tc=TIPO_COLORS[v.tipo]||'#374151';
  let dl='';
  if(v.deadline){
    const d=Math.ceil((new Date(v.deadline)-new Date())/86400000);
    const dc=d<0?'tdl-late':d<=3?'tdl-w':'tdl-ok';
    const dl_t=d<0?`${Math.abs(d)}d atraso`:d===0?'hoje':`${d}d`;
    dl=`<span class="tag ${dc}">⏰ ${dl_t}</span>`;
  }
  return`<div class="card" onclick="openVideoModal('${v.id}')">
    <div class="card-tipo-dot" style="background:${tc}" title="${v.tipo||''}"></div>
    <div class="card-title">${esc(v.titulo)}</div>
    ${v.objetivo?`<div class="card-obj">${esc(v.objetivo)}</div>`:''}
    <div class="card-tags">
      <span class="tag ${lc}">${le}</span>
      ${v.tipo?`<span class="tag ttipo">${v.tipo}</span>`:''}
      <span class="tag tmonth">${v.mes}</span>
      ${dl}
    </div>
    ${v.descricao?`<div class="card-desc">${esc(v.descricao)}</div>`:''}
  </div>`;
}

// ── CALENDAR ──
function initCal(){
  const now=new Date();
  calYear=now.getFullYear(); calMonth=now.getMonth();
}

function renderCalendar(){
  const months=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  document.getElementById('cal-title').textContent=`${months[calMonth]} ${calYear}`;

  // Legend
  const usedTypes=[...new Set(videos.map(v=>v.tipo).filter(Boolean))];
  let legHTML=usedTypes.map(t=>`<span class="leg-item"><span class="leg-dot" style="background:${TIPO_COLORS[t]||'#374151'}"></span>${t}</span>`).join('');
  if(specials.length) legHTML+=`<span class="leg-item"><span class="leg-bar" style="background:var(--roxo)"></span>Data especial</span>`;
  document.getElementById('cal-legend').innerHTML=legHTML;

  // Build grid
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date(); today.setHours(0,0,0,0);

  let html='';
  ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].forEach(d=>{html+=`<div class="dow">${d}</div>`;});

  // Prev month days
  const prevDays=new Date(calYear,calMonth,0).getDate();
  for(let i=firstDay-1;i>=0;i--){
    html+=`<div class="cday other-m"><div class="cday-num">${prevDays-i}</div></div>`;
  }

  // Current month
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dt=new Date(calYear,calMonth,d);
    const isToday=dt.getTime()===today.getTime();

    // Specials for this day
    const daySpecials=specials.filter(s=>s.data===dateStr);
    // Videos for this day
    const dayVideos=videos.filter(v=>v.deadline===dateStr);

    const sbar=daySpecials.length?`<div class="cday-sbar" style="background:${daySpecials[0].cor}"></div>`:'';
    const slabels=daySpecials.map(s=>`<div class="cday-slabel" style="background:${s.cor}22;color:${s.cor}" onclick="event.stopPropagation();openSpecialModal('${s.id}')">${esc(s.titulo)}</div>`).join('');

    const maxChips=daySpecials.length?2:3;
    const chips=dayVideos.slice(0,maxChips).map(v=>`<div class="cvchip" style="background:${TIPO_COLORS[v.tipo]||'#7C3AED'}22;color:${TIPO_COLORS[v.tipo]||'#7C3AED'}" onclick="event.stopPropagation();openVideoModal('${v.id}')">${esc(v.titulo)}</div>`).join('');
    const more=dayVideos.length>maxChips?`<div class="cday-more">+${dayVideos.length-maxChips} vídeos</div>`:'';

    html+=`<div class="cday${isToday?' today':''}${daySpecials.length?' has-special':''}" onclick="openVideoModalOnDate('${dateStr}')">
      ${sbar}
      <div class="cday-num">${isToday?`<span>${d}</span>`:d}</div>
      ${slabels}${chips}${more}
      <button class="btn-add-day" onclick="event.stopPropagation();openSpecialModal(null,'${dateStr}')" title="Data especial">🎉</button>
    </div>`;
  }

  // Next month fill
  const total=firstDay+daysInMonth;
  const remaining=(7-total%7)%7;
  for(let d=1;d<=remaining;d++) html+=`<div class="cday other-m"><div class="cday-num">${d}</div></div>`;

  document.getElementById('cal-grid').innerHTML=html;
}

function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}
function calToday(){initCal();renderCalendar();}

// ── VIDEO MODAL ──
function openVideoModal(id, defaultStatus, defaultDate){
  editingVideoId=id||null;
  const v=id?videos.find(x=>x.id===id):null;
  document.getElementById('vm-title').textContent=v?'Editar vídeo':'Novo vídeo';
  document.getElementById('vbtn-del').style.display=v?'block':'none';
  document.getElementById('vf-titulo').value=v?.titulo||'';
  document.getElementById('vf-objetivo').value=v?.objetivo||'';
  document.getElementById('vf-descricao').value=v?.descricao||'';
  document.getElementById('vf-nivel').value=v?.nivel||'1';
  document.getElementById('vf-tipo').value=v?.tipo||'Reels';
  document.getElementById('vf-mes').value=v?.mes||currentMonth;
  document.getElementById('vf-status').value=v?.status||defaultStatus||'Backlog';
  document.getElementById('vf-deadline').value=v?.deadline||defaultDate||'';
  document.getElementById('ov-video').classList.add('open');
  setTimeout(()=>document.getElementById('vf-titulo').focus(),100);
}

function openVideoModalOnDate(dateStr){
  // figure out month
  const [y,m]=dateStr.split('-');
  const monthNames={1:'Jan',2:'Fev',3:'Mar',4:'Abr',5:'Mai',6:'Jun',7:'Jul',8:'Ago',9:'Set',10:'Out',11:'Nov',12:'Dez'};
  const shortM=parseInt(m)>=6&&parseInt(m)<=7?(['Jun','Jul'][parseInt(m)-6]):monthNames[parseInt(m)];
  openVideoModal(null,'Backlog',dateStr);
  document.getElementById('vf-mes').value=shortM||currentMonth;
}

function closeVideoModal(){document.getElementById('ov-video').classList.remove('open');editingVideoId=null;}

async function saveVideo(){
  const titulo=document.getElementById('vf-titulo').value.trim();
  if(!titulo){toast('Preencha o título!');return;}
  const body={
    titulo,
    objetivo:document.getElementById('vf-objetivo').value.trim()||null,
    descricao:document.getElementById('vf-descricao').value.trim()||null,
    nivel:parseInt(document.getElementById('vf-nivel').value),
    tipo:document.getElementById('vf-tipo').value,
    mes:document.getElementById('vf-mes').value,
    status:document.getElementById('vf-status').value,
    deadline:document.getElementById('vf-deadline').value||null,
  };
  try{
    if(editingVideoId) await api('PATCH',`videos?id=eq.${editingVideoId}`,body);
    else await api('POST','videos',body);
    toast(editingVideoId?'Vídeo atualizado ✓':'Vídeo criado ✓');
    closeVideoModal(); await load();
  }catch(e){toast('Erro ao salvar');console.error(e);}
}

async function deleteVideo(){
  if(!editingVideoId||!confirm('Excluir este vídeo?')) return;
  try{await api('DELETE',`videos?id=eq.${editingVideoId}`);toast('Vídeo excluído');closeVideoModal();await load();}
  catch(e){toast('Erro ao excluir');}
}

// ── SPECIAL MODAL ──
function buildColorOpts(){
  document.getElementById('color-opts').innerHTML=SPECIAL_COLORS.map(c=>
    `<div class="copt${c===selectedColor?' sel':''}" style="background:${c}" onclick="selectColor('${c}')" data-c="${c}"></div>`
  ).join('');
}

function selectColor(c){
  selectedColor=c;
  document.querySelectorAll('.copt').forEach(el=>{
    el.classList.toggle('sel',el.dataset.c===c);
  });
}

function openSpecialModal(id, defaultDate){
  editingSpecialId=id||null;
  const s=id?specials.find(x=>x.id===id):null;
  document.getElementById('sm-title').textContent=s?'Editar data especial':'Nova data especial';
  document.getElementById('sbtn-del').style.display=s?'block':'none';
  document.getElementById('sf-data').value=s?.data||defaultDate||'';
  document.getElementById('sf-titulo').value=s?.titulo||'';
  selectedColor=s?.cor||SPECIAL_COLORS[0];
  buildColorOpts();
  document.getElementById('ov-special').classList.add('open');
}

function closeSpecialModal(){document.getElementById('ov-special').classList.remove('open');editingSpecialId=null;}

async function saveSpecial(){
  const data=document.getElementById('sf-data').value;
  const titulo=document.getElementById('sf-titulo').value.trim();
  if(!data||!titulo){toast('Preencha data e título!');return;}
  const body={data,titulo,cor:selectedColor};
  try{
    if(editingSpecialId) await api('PATCH',`datas_especiais?id=eq.${editingSpecialId}`,body);
    else await api('POST','datas_especiais',body);
    toast(editingSpecialId?'Data atualizada ✓':'Data especial criada ✓');
    closeSpecialModal(); await load();
  }catch(e){toast('Erro ao salvar');console.error(e);}
}

async function deleteSpecial(){
  if(!editingSpecialId||!confirm('Excluir esta data especial?')) return;
  try{await api('DELETE',`datas_especiais?id=eq.${editingSpecialId}`);toast('Data excluída');closeSpecialModal();await load();}
  catch(e){toast('Erro ao excluir');}
}

// ── FILTERS / VIEWS ──
function showView(v){
  currentView=v;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.ntab[onclick*="${v}"]`).classList.add('active');

  const isKanban=v==='kanban';
  document.getElementById('mbar').style.display=isKanban?'flex':'none';
  document.getElementById('fbar').style.display=isKanban?'flex':'none';
  if(!isKanban) renderCalendar();
  else renderKanban();
}

function setMonth(m){
  currentMonth=m;
  document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('active'));
  document.getElementById('mt-'+m).classList.add('active');
  render();
}

function setLevel(l){
  currentLevel=l;
  document.querySelectorAll('[id^="lv-"]').forEach(b=>b.classList.remove('active'));
  document.getElementById('lv-'+l).classList.add('active');
  renderKanban();
}

function setTipo(t){
  currentTipo=t;
  document.querySelectorAll('[id^="tp-"]').forEach(b=>b.classList.remove('active'));
  document.getElementById('tp-'+t).classList.add('active');
  renderKanban();
}

// Close modals on overlay click
document.getElementById('ov-video').addEventListener('click',e=>{if(e.target===e.currentTarget)closeVideoModal();});
document.getElementById('ov-special').addEventListener('click',e=>{if(e.target===e.currentTarget)closeSpecialModal();});

// Toast
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2600);
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Poll
function startPoll(){setInterval(load,9000);}

// INIT
initCal();
document.getElementById('mbar').style.display='flex';
document.getElementById('fbar').style.display='flex';
load().then(startPoll);
</script>
