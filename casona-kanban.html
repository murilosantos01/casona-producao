<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casona Açaí · Produção</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --roxo:#7C3AED;--roxo2:#A855F7;--roxo-l:#EDE9FE;--roxo-xl:#F5F3FF;
  --bg:#F0EEFF;--white:#fff;--bd:#E4E0F5;--bd2:#C9C2ED;
  --text:#1E1B4B;--t2:#4B5563;--muted:#9CA3AF;
  --n1:#7C3AED;--n1b:#EDE9FE;--n2:#D97706;--n2b:#FEF3C7;--n3:#059669;--n3b:#D1FAE5;
  --sh:0 1px 4px rgba(0,0,0,.08);--sh2:0 4px 16px rgba(124,58,237,.14);
  --sidebar:224px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--white);border-right:1.5px solid var(--bd);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar-logo{padding:18px 16px 14px;display:flex;align-items:center;gap:10px;border-bottom:1.5px solid var(--bd)}
.logo-ico{width:34px;height:34px;border-radius:9px;flex-shrink:0;background:linear-gradient(135deg,var(--roxo),var(--roxo2));display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 8px rgba(124,58,237,.3)}
.logo-text{font-family:'Syne',sans-serif;font-weight:900;font-size:14px;color:var(--text);line-height:1.2}
.logo-sub{font-size:10px;color:var(--muted);font-weight:500}
.sidebar-nav{padding:10px 8px;flex:1;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--t2);cursor:pointer;text-align:left;width:100%;transition:all .15s}
.nav-item:hover{background:var(--roxo-xl);color:var(--roxo)}
.nav-item.active{background:var(--roxo-l);color:var(--roxo);font-weight:700}
.nav-ico{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;min-width:18px;height:18px;background:var(--roxo);color:#fff;border-radius:99px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px}
.sidebar-sprint{margin:8px;padding:14px;background:var(--roxo-xl);border-radius:12px;border:1.5px solid var(--bd)}
.sprint-title{font-family:'Syne',sans-serif;font-weight:800;font-size:10px;color:var(--roxo);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
.sprint-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.sprint-lbl{font-size:11px;color:var(--t2);font-weight:600}
.sprint-pill{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.sp-ok{background:#D1FAE5;color:#065F46}.sp-warn{background:#FFE4E6;color:#9F1239}.sp-info{background:var(--roxo-l);color:var(--roxo)}
.ptrack{width:100%;height:5px;background:#DDD6FE;border-radius:99px;overflow:hidden;margin-top:2px}
.pfill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--roxo),var(--roxo2));transition:width .4s}
.btn-new-sb{margin:0 8px 12px;padding:11px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--roxo),var(--roxo2));color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(124,58,237,.3);transition:all .15s;width:calc(100% - 16px)}
.btn-new-sb:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(124,58,237,.4)}

/* ── MAIN ── */
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh;min-width:0}

/* ── TOPBAR ── */
.topbar{background:var(--white);border-bottom:1.5px solid var(--bd);padding:0 22px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--sh);gap:12px}
.topbar-title{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:8px}

/* FILTER STRIP */
.fstrip{background:var(--white);border-bottom:1.5px solid var(--bd);padding:7px 22px;display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.flabel{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.fbtn{padding:4px 11px;border-radius:20px;border:1.5px solid var(--bd);background:var(--white);color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.fbtn:hover{border-color:var(--roxo);color:var(--roxo)}
.fbtn.active{background:var(--text);color:#fff;border-color:var(--text)}
.fsep{width:1px;height:16px;background:var(--bd);margin:0 2px;flex-shrink:0}

/* ── PERIOD NAV BAR (above kanban columns) ── */
.period-nav{
  display:flex;align-items:center;justify-content:center;
  gap:0;padding:12px 22px 0;
  background:transparent;
}
.period-nav-inner{
  display:inline-flex;align-items:center;
  background:var(--white);border:1.5px solid var(--bd);
  border-radius:14px;overflow:hidden;box-shadow:var(--sh);
}
.pnav-btn{
  padding:10px 18px;border:none;background:none;
  font-family:'Syne',sans-serif;font-weight:800;font-size:18px;
  color:var(--roxo);cursor:pointer;transition:all .15s;
  line-height:1;display:flex;align-items:center;
}
.pnav-btn:hover{background:var(--roxo-l)}
.pnav-label{
  padding:10px 24px;
  font-family:'Syne',sans-serif;font-weight:900;font-size:16px;
  color:var(--text);min-width:180px;text-align:center;
  border-left:1.5px solid var(--bd);border-right:1.5px solid var(--bd);
  cursor:default;user-select:none;
}
.pnav-year-btns{display:flex;align-items:center;gap:0;border-left:1.5px solid var(--bd)}
.pnav-year-btn{padding:10px 10px;border:none;background:none;font-family:'DM Sans',sans-serif;font-weight:700;font-size:11px;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.pnav-year-btn:hover{color:var(--roxo);background:var(--roxo-l)}
.pnav-year-btn.active-year{color:var(--roxo);font-weight:800}

/* ── VIEWS ── */
.view{display:none}.view.active{display:block}

/* ── KANBAN ── */
.kwrap{overflow-x:auto;padding:12px 22px 48px}
.kboard{display:flex;gap:10px;align-items:flex-start;min-width:max-content}

/* COLUMN */
.col{width:244px;background:var(--white);border-radius:12px;border:1.5px solid var(--bd);box-shadow:var(--sh);overflow:hidden;transition:all .2s}
.col.drag-over{border-color:var(--roxo);box-shadow:0 0 0 3px rgba(124,58,237,.15);background:var(--roxo-xl)}
.col-hd{padding:11px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid var(--bd)}
.col-dot{width:8px;height:8px;border-radius:50%;margin-right:7px;flex-shrink:0}
.col-name{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;display:flex;align-items:center}
.col-cnt{min-width:20px;height:20px;border-radius:99px;background:var(--bg);color:var(--muted);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px}
.col-body{padding:8px;min-height:80px}

/* CARD */
.card{background:var(--white);border:1.5px solid var(--bd);border-radius:10px;padding:11px 11px 10px 15px;margin-bottom:7px;cursor:grab;transition:all .15s;position:relative;border-left-width:4px;user-select:none}
.card:hover{box-shadow:var(--sh2);transform:translateY(-1px)}
.card.lvl-1{border-left-color:var(--n1)}.card.lvl-2{border-left-color:var(--n2)}.card.lvl-3{border-left-color:var(--n3)}
.card:hover.lvl-1{border-color:var(--n1)}.card:hover.lvl-2{border-color:var(--n2)}.card:hover.lvl-3{border-color:var(--n3)}
.card.dragging{opacity:.4;cursor:grabbing;transform:rotate(1.5deg) scale(1.02);box-shadow:0 8px 24px rgba(124,58,237,.25)}
.card-title{font-weight:700;font-size:13px;color:var(--text);margin-bottom:3px;line-height:1.35}
.card-obj{font-size:11px;color:var(--muted);margin-bottom:7px}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.tag{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.tn1{background:var(--n1b);color:var(--n1)}.tn2{background:var(--n2b);color:var(--n2)}.tn3{background:var(--n3b);color:var(--n3)}
.tdl-ok{background:#F1F5F9;color:#475569}.tdl-w{background:#FEF3C7;color:#92400E}.tdl-late{background:#FFE4E6;color:#9F1239}.tdl-none{background:#F3F4F6;color:#9CA3AF}
.tipo-chip{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 8px}
.tipo-Reels{background:#EDE9FE;color:#7C3AED;border-radius:20px}
.tipo-Story{background:#FCE7F3;color:#DB2777;border-radius:4px;padding:2px 6px}
.tipo-Carrossel{background:#DBEAFE;color:#1D4ED8;border-radius:5px;border:1.5px solid #BFDBFE}
.tipo-Feed{background:#E0F2FE;color:#0369A1;border-radius:20px}
.tipo-TikTok{background:#111;color:#fff;border-radius:20px}
.tipo-YTShorts{background:#FFE4E4;color:#DC2626;border-radius:20px}
.card-desc{font-size:11px;color:var(--muted);margin-top:7px;font-style:italic;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* CARD MOVE BUTTONS (mobile fallback) */
.card-move-btns{display:none;gap:3px;margin-top:8px;justify-content:flex-end}
.card-move-btn{padding:3px 8px;border-radius:6px;border:1px solid var(--bd);background:var(--bg);font-size:10px;font-weight:700;cursor:pointer;color:var(--t2);font-family:'DM Sans',sans-serif;transition:all .15s}
.card-move-btn:hover{border-color:var(--roxo);color:var(--roxo)}

.btn-col-add{width:100%;padding:8px;background:none;border:1.5px dashed var(--bd);border-radius:9px;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:3px;transition:all .15s}
.btn-col-add:hover{border-color:var(--roxo);color:var(--roxo);background:var(--roxo-xl)}

/* ── CALENDAR ── */
.calwrap{padding:16px 22px 48px}
.calnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.cal-title-text{font-family:'Syne',sans-serif;font-weight:900;font-size:20px;color:var(--text)}
.calnav-btns{display:flex;gap:6px;flex-wrap:wrap}
.cnbtn{padding:6px 13px;border-radius:20px;border:1.5px solid var(--bd);background:var(--white);color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.cnbtn:hover{border-color:var(--roxo);color:var(--roxo)}
.cal-legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--t2)}
.leg-dot{width:9px;height:9px;border-radius:50%}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.dow{text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:4px 0;text-transform:uppercase;letter-spacing:.05em}
.cday{background:var(--white);border:1.5px solid var(--bd);border-radius:10px;min-height:100px;padding:6px;position:relative;overflow:hidden;transition:border-color .15s}
.cday:hover{border-color:var(--bd2)}
.cday.today{border-color:var(--roxo);border-width:2px}
.cday.other-m{opacity:.3;pointer-events:none}
.cday-num{font-family:'Syne',sans-serif;font-weight:800;font-size:12px;color:var(--text);margin-bottom:3px;line-height:1}
.cday.today .cday-num{background:var(--roxo);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px}
.cday-sbar{position:absolute;top:0;left:0;right:0;height:3px}
.cday-slabel{font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;cursor:pointer}
.cday-slabel:hover{opacity:.75}
.cvchip{font-size:9px;font-weight:700;padding:2px 6px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;cursor:pointer;display:block;border-radius:4px}
.cvchip:hover{opacity:.75}
.cvchip.t-Reels{background:#EDE9FE;color:#7C3AED;border-radius:20px}
.cvchip.t-Story{background:#FCE7F3;color:#DB2777;border-radius:3px}
.cvchip.t-Carrossel{background:#DBEAFE;color:#1D4ED8;border-radius:3px;border:1px solid #BFDBFE}
.cvchip.t-Feed{background:#E0F2FE;color:#0369A1;border-radius:20px}
.cvchip.t-TikTok{background:#111;color:#fff;border-radius:20px}
.cvchip.t-YTShorts{background:#FFE4E4;color:#DC2626;border-radius:20px}
.cday-more{font-size:9px;color:var(--muted);font-weight:600;margin-top:1px}
.cday-actions{position:absolute;bottom:4px;right:4px;display:none;gap:3px}
.cday:hover .cday-actions{display:flex}
.cday-action-btn{width:18px;height:18px;border-radius:50%;border:none;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-weight:700}
.btn-av{background:var(--roxo-l);color:var(--roxo)}.btn-av:hover{background:var(--roxo);color:#fff}
.btn-as{background:#FEF3C7;color:#D97706}.btn-as:hover{background:#D97706;color:#fff}

/* ── IDEAS ── */
.ideaswrap{padding:16px 22px 48px;max-width:860px}
.ideas-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.ideas-title{font-family:'Syne',sans-serif;font-weight:900;font-size:18px;color:var(--text)}
.idea-card{background:var(--white);border:1.5px solid var(--bd);border-radius:12px;padding:16px 18px;margin-bottom:10px;display:flex;gap:14px;align-items:flex-start;box-shadow:var(--sh);transition:all .15s}
.idea-card:hover{border-color:var(--bd2);box-shadow:var(--sh2)}
.idea-body{flex:1;min-width:0}
.idea-title{font-weight:700;font-size:14px;color:var(--text);margin-bottom:4px}
.idea-desc{font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:8px}
.idea-link{font-size:11px;color:var(--roxo);font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:4px;word-break:break-all}
.idea-link:hover{text-decoration:underline}
.idea-date{font-size:10px;color:var(--muted);margin-top:6px}
.idea-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.ib{padding:6px 12px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.ib-promote{background:linear-gradient(135deg,var(--roxo),var(--roxo2));color:#fff}
.ib-promote:hover{opacity:.9;transform:translateY(-1px)}
.ib-edit{background:var(--bg);color:var(--t2);border:1.5px solid var(--bd)}
.ib-edit:hover{border-color:var(--roxo);color:var(--roxo)}
.ib-del{background:#FFE4E6;color:#9F1239;border:1.5px solid #FECACA}
.ib-del:hover{background:#FECACA}
.ideas-empty{text-align:center;padding:60px 20px;color:var(--muted)}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
.overlay.open{display:flex}
.modal{background:var(--white);border-radius:20px;padding:26px;width:480px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.22);animation:mdin .2s ease}
.modal-sm{width:400px}
@keyframes mdin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mtitle{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:var(--text)}
.mclose{background:none;border:none;font-size:21px;color:var(--muted);cursor:pointer;padding:2px 6px;border-radius:6px;transition:all .1s;line-height:1}
.mclose:hover{background:var(--bg);color:var(--text)}
.fg{margin-bottom:14px}
.flb{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.fi,.fs,.fta{width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--white);outline:none;transition:border-color .15s;appearance:none}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--roxo);box-shadow:0 0 0 3px rgba(124,58,237,.1)}
.fta{resize:vertical;min-height:72px;line-height:1.5}
.frow{display:flex;gap:10px}.frow .fg{flex:1}
.fhint{font-size:11px;color:var(--muted);margin-top:4px}
.color-opts{display:flex;gap:7px;flex-wrap:wrap;padding:3px 0}
.copt{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;flex-shrink:0}
.copt.sel{border-color:var(--text);transform:scale(1.15)}
.mactions{display:flex;gap:8px;margin-top:20px;align-items:center;flex-wrap:wrap}
.btn{padding:10px 18px;border-radius:11px;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-p{background:linear-gradient(135deg,var(--roxo),var(--roxo2));color:#fff;flex:2}
.btn-p:hover{opacity:.9;transform:translateY(-1px)}
.btn-s{background:var(--bg);color:var(--t2);border:1.5px solid var(--bd);flex:1}
.btn-d{background:#FFE4E6;color:#9F1239;border:1.5px solid #FECACA}
.btn-d:hover{background:#FECACA}
.section-divider{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:6px 0 2px;border-top:1px solid var(--bd);margin-top:4px;margin-bottom:8px}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;padding:10px 18px;border-radius:11px;font-size:13px;font-weight:600;z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;max-width:280px}
.toast.show{opacity:1;transform:translateY(0)}

/* LOADING */
.load-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px;color:var(--muted)}
.spinner{width:30px;height:30px;border:3px solid var(--bd);border-top-color:var(--roxo);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* MOBILE */
.mob-header{display:none;background:var(--white);border-bottom:1.5px solid var(--bd);padding:0 16px;height:52px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.mob-menu-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:98}

@media(max-width:720px){
  .sidebar{transform:translateX(-100%);transition:transform .25s;z-index:99}
  .sidebar.mob-open{transform:translateX(0)}
  .sidebar-overlay.mob-open{display:block}
  .main{margin-left:0}
  .mob-header{display:flex}
  .topbar{display:none}
  .kwrap,.calwrap,.ideaswrap{padding:10px 8px 48px}
  .fstrip{padding:7px 8px}
  .period-nav{padding:10px 8px 0}
  .pnav-label{min-width:130px;font-size:14px}
  .card-move-btns{display:flex}
}
</style>
</head>
<body>

<div class="mob-header">
  <button class="mob-menu-btn" onclick="toggleMob()">☰</button>
  <span style="font-family:'Syne',sans-serif;font-weight:900;font-size:15px">Casona · Produção</span>
  <button class="btn-new-sb" style="width:auto;margin:0;padding:7px 14px;font-size:12px" onclick="openVideoModal()">+ Novo</button>
</div>
<div class="sidebar-overlay" id="sb-overlay" onclick="toggleMob()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-ico">🎥</div>
    <div><div class="logo-text">Casona Açaí</div><div class="logo-sub">Produção de vídeos</div></div>
  </div>
  <nav class="sidebar-nav">
    <button class="nav-item active" onclick="showView('kanban')" id="nav-kanban"><span class="nav-ico">📋</span>Kanban</button>

<script>
const SB_URL='https://lwhovmhhfqngzjlztfea.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3aG92bWhoZnFuZ3pqbHp0ZmVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMjYxMTgsImV4cCI6MjA5NDgwMjExOH0.GG0Hbyc1JeDLB6f3SrQSLsTCsBdhuLI1R_U7A-IxYlE';

const MONTHS_S=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const MONTHS_F=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const STATUSES=['Backlog','Em produção','Aguarda aprovação','Em ajuste','Publicado'];
const S_CLR={'Backlog':'#94A3B8','Em produção':'#D97706','Aguarda aprovação':'#2563EB','Em ajuste':'#DC2626','Publicado':'#059669'};
const TIPO_CLR={'Reels':'#7C3AED','Story':'#DB2777','Carrossel':'#1D4ED8','Feed':'#0369A1','TikTok':'#111111','YT Shorts':'#DC2626'};
const SPECIAL_COLORS=['#7C3AED','#DB2777','#D97706','#059669','#2563EB','#DC2626','#0891B2','#65A30D','#EA580C','#9333EA','#0F172A','#B45309'];

const _now=new Date();
let videos=[], specials=[], ideias=[];
let currentMonth=MONTHS_S[_now.getMonth()];
let currentYear=Math.max(2026,_now.getFullYear());
let currentLevel='todos', currentTipo='todos', currentView='kanban';
let calYear=_now.getFullYear(), calMonth=_now.getMonth();
let editingVideoId=null, editingSpecialId=null, editingIdeaId=null;
let selectedColor=SPECIAL_COLORS[0];
let dragSrcId=null;

// ── HELPERS ──
function normDate(d){if(!d)return null;return String(d).substring(0,10);}
function mesAnoFromDeadline(dl){
  if(!dl)return null;
  const[y,m]=normDate(dl).split('-');
  return{mes:MONTHS_S[parseInt(m)-1],ano:parseInt(y)};
}

// ── API ──
async function api(method,path,body){
  const opts={method,headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(SB_URL+'/rest/v1/'+path,opts);
  const t=await r.text();
  if(!r.ok)throw new Error(t);
  return t?JSON.parse(t):null;
}

async function load(){
  try{
    const[v,s,i]=await Promise.all([
      api('GET','videos?order=created_at.asc'),
      api('GET','datas_especiais?order=data.asc'),
      api('GET','ideias?order=created_at.desc'),
    ]);
    videos=(v||[]).map(vid=>({
      ...vid,
      deadline:normDate(vid.deadline),
      ...(vid.deadline?mesAnoFromDeadline(vid.deadline):{})
    }));
    specials=(s||[]).map(sp=>({...sp,data:normDate(sp.data)}));
    ideias=i||[];
    render();
  }catch(e){console.error(e);toast('Erro ao carregar: '+e.message);}
}

// ── RENDER ──
function render(){
  renderSprint();
  renderIdeasBadge();
  renderPeriodNav();
  if(currentView==='kanban')renderKanban();
  else if(currentView==='calendar')renderCalendar();
  else renderIdeas();
}

function renderSprint(){
  const mv=videos.filter(v=>v.mes===currentMonth&&String(v.ano||2026)===String(currentYear));
  const total=mv.length,pub=mv.filter(v=>v.status==='Publicado').length;
  const n1=mv.filter(v=>v.nivel==1).length;
  const pct=Math.min(100,Math.round((pub/8)*100));
  document.getElementById('sb-sprint').innerHTML=`
    <div class="sprint-title">Sprint ${currentMonth} ${currentYear}</div>
    <div class="sprint-row"><span class="sprint-lbl">N1 obrigatórios</span><span class="sprint-pill ${n1>=3?'sp-ok':'sp-warn'}">${n1}/3 ${n1>=3?'✓':'⚠'}</span></div>
    <div class="sprint-row"><span class="sprint-lbl">Vídeos</span><span class="sprint-pill sp-info">${total}/8</span></div>
    <div class="sprint-row" style="margin-bottom:4px"><span class="sprint-lbl">Publicados</span><span style="font-weight:700;font-size:12px;color:var(--roxo)">${pub}</span></div>
    <div class="ptrack"><div class="pfill" style="width:${pct}%"></div></div>`;
}

function renderIdeasBadge(){
  const b=document.getElementById('ideas-badge');
  if(ideias.length){b.style.display='flex';b.textContent=ideias.length;}else b.style.display='none';
}

function renderPeriodNav(){
  document.getElementById('pnav-label').textContent=`${MONTHS_F[MONTHS_S.indexOf(currentMonth)]} ${currentYear}`;
  ['2026','2027'].forEach(y=>{
    const el=document.getElementById('ybtn-'+y);
    if(el)el.classList.toggle('active-year',String(currentYear)===y);
  });
}

// ── PERIOD NAVIGATION ──
function navPeriod(delta){
  let idx=MONTHS_S.indexOf(currentMonth)+delta;
  if(idx<0){idx=11;currentYear=Math.max(2026,currentYear-1);}
  else if(idx>11){idx=0;currentYear=Math.min(2027,currentYear+1);}
  currentMonth=MONTHS_S[idx];
  renderSprint();renderPeriodNav();renderKanban();
}

function setYear(y){
  currentYear=y;
  renderSprint();renderPeriodNav();renderKanban();
}

// ── KANBAN ──
function renderKanban(){
  const vids=videos.filter(v=>{
    if(v.mes!==currentMonth)return false;
    if(String(v.ano||2026)!==String(currentYear))return false;
    if(currentLevel!=='todos'&&String(v.nivel)!==currentLevel)return false;
    if(currentTipo!=='todos'&&v.tipo!==currentTipo)return false;
    return true;
  });
  document.getElementById('kboard').innerHTML=STATUSES.map(st=>{
    const sv=vids.filter(v=>v.status===st);
    return`<div class="col" id="col-${st.replace(/\s/g,'_')}"
      ondragover="colDragOver(event,'${st}')"
      ondragleave="colDragLeave(event)"
      ondrop="colDrop(event,'${st}')">
      <div class="col-hd">
        <span class="col-name"><span class="col-dot" style="background:${S_CLR[st]}"></span>${st}</span>
        <span class="col-cnt">${sv.length}</span>
      </div>
      <div class="col-body">
        ${sv.length?sv.map(v=>cardHTML(v,st)).join(''):'<div style="text-align:center;padding:16px 8px;font-size:12px;color:var(--muted)">Vazio</div>'}
        <button class="btn-col-add" onclick="openVideoModal(null,'${st}')">+ Adicionar aqui</button>
      </div>
    </div>`;
  }).join('');
}

function tipoChipHTML(tipo){
  if(!tipo)return'';
  const key=tipo.replace(/\s/g,'');
  const icons={Reels:'🎞',Story:'📱',Carrossel:'🖼',Feed:'📷',TikTok:'🎵',YTShorts:'▶'};
  return`<span class="tipo-chip tipo-${key}">${icons[key]||''} ${tipo}</span>`;
}

function cardHTML(v,currentStatus){
  const le={1:'🎬 N1',2:'⚡ N2',3:'🤖 N3'}[v.nivel]||'?';
  const lc={1:'tn1',2:'tn2',3:'tn3'}[v.nivel]||'tn1';
  const lvlClass={1:'lvl-1',2:'lvl-2',3:'lvl-3'}[v.nivel]||'lvl-1';
  let dlTag='';
  if(v.deadline){
    const d=Math.ceil((new Date(v.deadline)-new Date())/86400000);
    const dc=d<0?'tdl-late':d<=3?'tdl-w':'tdl-ok';
    const dt=d<0?`${Math.abs(d)}d atraso`:d===0?'hoje':`${d}d`;
    dlTag=`<span class="tag ${dc}">📅 ${dt}</span>`;
  }else{
    dlTag=`<span class="tag tdl-none">Sem data</span>`;
  }

  // Mobile move buttons: prev/next status
  const idx=STATUSES.indexOf(currentStatus);
  const prevS=idx>0?STATUSES[idx-1]:null;
  const nextS=idx<STATUSES.length-1?STATUSES[idx+1]:null;
  const moveBtns=`<div class="card-move-btns">
    ${prevS?`<button class="card-move-btn" onclick="event.stopPropagation();moveCard('${v.id}','${prevS}')">← ${prevS}</button>`:''}
    ${nextS?`<button class="card-move-btn" onclick="event.stopPropagation();moveCard('${v.id}','${nextS}')">${nextS} →</button>`:''}
  </div>`;

  return`<div class="card ${lvlClass}"
    id="card-${v.id}"
    draggable="true"
    ondragstart="cardDragStart(event,'${v.id}')"
    ondragend="cardDragEnd(event)"
    onclick="openVideoModal('${v.id}')">
    <div class="card-title">${esc(v.titulo)}</div>
    ${v.objetivo?`<div class="card-obj">${esc(v.objetivo)}</div>`:''}
    <div class="card-tags">
      <span class="tag ${lc}">${le}</span>
      ${tipoChipHTML(v.tipo)}
      ${dlTag}
    </div>
    ${v.descricao?`<div class="card-desc">${esc(v.descricao)}</div>`:''}
    ${moveBtns}
  </div>`;
}

// ── DRAG AND DROP ──
function cardDragStart(e,id){
  dragSrcId=id;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',id);
  setTimeout(()=>{
    const el=document.getElementById('card-'+id);
    if(el)el.classList.add('dragging');
  },0);
}

function cardDragEnd(e){
  if(dragSrcId){
    const el=document.getElementById('card-'+dragSrcId);
    if(el)el.classList.remove('dragging');
  }
  // Remove all drag-over highlights
  document.querySelectorAll('.col.drag-over').forEach(c=>c.classList.remove('drag-over'));
  dragSrcId=null;
}

function colDragOver(e,status){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const colEl=document.getElementById('col-'+status.replace(/\s/g,'_'));
  if(colEl)colEl.classList.add('drag-over');
}

function colDragLeave(e){
  // Only remove if leaving the column itself, not a child
  if(e.currentTarget&&!e.currentTarget.contains(e.relatedTarget)){
    e.currentTarget.classList.remove('drag-over');
  }
}

async function colDrop(e,status){
  e.preventDefault();
  const id=e.dataTransfer.getData('text/plain')||dragSrcId;
  const colEl=document.getElementById('col-'+status.replace(/\s/g,'_'));
  if(colEl)colEl.classList.remove('drag-over');
  if(!id)return;
  const v=videos.find(x=>x.id===id);
  if(!v||v.status===status)return;
  // Optimistic update
  v.status=status;
  renderKanban();
  renderSprint();
  try{
    await api('PATCH',`videos?id=eq.${id}`,{status});
    toast(`Movido para ${status} ✓`);
  }catch(ex){
    toast('Erro ao mover card');
    await load();
  }
}

async function moveCard(id,status){
  const v=videos.find(x=>x.id===id);
  if(!v)return;
  v.status=status;
  renderKanban();renderSprint();
  try{
    await api('PATCH',`videos?id=eq.${id}`,{status});
    toast(`Movido para ${status} ✓`);
  }catch(ex){toast('Erro ao mover');await load();}
}

// ── CALENDAR ──
function renderCalendar(){
  document.getElementById('topbar-right').innerHTML='';
  document.getElementById('cal-title').textContent=`${MONTHS_F[calMonth]} ${calYear}`;
  const usedTipos=[...new Set(videos.map(v=>v.tipo).filter(Boolean))];
  let leg=usedTipos.map(t=>`<span class="leg-item"><span class="leg-dot" style="background:${TIPO_CLR[t]||'#374151'}"></span>${t}</span>`).join('');
  if(specials.length)leg+=`<span class="leg-item"><span style="width:18px;height:3px;border-radius:2px;background:var(--roxo);display:inline-block"></span>Data especial</span>`;
  document.getElementById('cal-legend').innerHTML=leg;

  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const prevDays=new Date(calYear,calMonth,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);

  let html='';
  ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].forEach(d=>{html+=`<div class="dow">${d}</div>`;});
  for(let i=firstDay-1;i>=0;i--)html+=`<div class="cday other-m"><div class="cday-num">${prevDays-i}</div></div>`;

  for(let d=1;d<=daysInMonth;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dt=new Date(calYear,calMonth,d);
    const isToday=dt.getTime()===today.getTime();
    const daySpecials=specials.filter(s=>normDate(s.data)===ds);
    const dayVideos=videos.filter(v=>normDate(v.deadline)===ds);
    const sbar=daySpecials.length?`<div class="cday-sbar" style="background:${daySpecials[0].cor}"></div>`:'';
    const slabels=daySpecials.map(s=>`<div class="cday-slabel" style="background:${s.cor}20;color:${s.cor}" onclick="event.stopPropagation();openSpecialModal('${s.id}')">🎉 ${esc(s.titulo)}</div>`).join('');
    const maxC=daySpecials.length?2:3;
    const chips=dayVideos.slice(0,maxC).map(v=>{
      const tkey=(v.tipo||'').replace(/\s/g,'');
      return`<div class="cvchip t-${tkey}" onclick="event.stopPropagation();openVideoModal('${v.id}')">${esc(v.titulo)}</div>`;
    }).join('');
    const more=dayVideos.length>maxC?`<div class="cday-more">+${dayVideos.length-maxC} vídeos</div>`:'';
    html+=`<div class="cday${isToday?' today':''}">
      ${sbar}<div class="cday-num">${d}</div>${slabels}${chips}${more}
      <div class="cday-actions">
        <button class="cday-action-btn btn-av" title="Novo vídeo" onclick="event.stopPropagation();openVideoModalOnDate('${ds}')">+</button>
        <button class="cday-action-btn btn-as" title="Data especial" onclick="event.stopPropagation();openSpecialModal(null,'${ds}')">🎉</button>
      </div>
    </div>`;
  }
  const rem=(7-(firstDay+daysInMonth)%7)%7;
  for(let d=1;d<=rem;d++)html+=`<div class="cday other-m"><div class="cday-num">${d}</div></div>`;
  document.getElementById('cal-grid').innerHTML=html;
}

function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}
function calToday(){calYear=_now.getFullYear();calMonth=_now.getMonth();renderCalendar();}

// ── IDEAS ──
function renderIdeas(){
  document.getElementById('topbar-right').innerHTML='';
  const el=document.getElementById('ideas-list');
  if(!ideias.length){
    el.innerHTML=`<div class="ideas-empty"><div style="font-size:40px;margin-bottom:12px">💡</div><div style="font-size:14px;font-weight:600">Nenhuma ideia ainda</div><div style="font-size:12px;margin-top:4px">Guarde referências e conceitos antes de virar card</div></div>`;
    return;
  }
  el.innerHTML=ideias.map(i=>`
    <div class="idea-card">
      <div class="idea-body">
        <div class="idea-title">${esc(i.titulo)}</div>
        ${i.descricao?`<div class="idea-desc">${esc(i.descricao)}</div>`:''}
        ${i.link?`<a class="idea-link" href="${esc(i.link)}" target="_blank" rel="noopener">🔗 ${esc(i.link)}</a>`:''}
        <div class="idea-date">${new Date(i.created_at).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'})}</div>
      </div>
      <div class="idea-actions">
        <button class="ib ib-promote" onclick="promoteIdeia('${i.id}')">→ Criar card</button>
        <button class="ib ib-edit" onclick="openIdeaModal('${i.id}')">✏️ Editar</button>
        <button class="ib ib-del" onclick="deleteIdeiaById('${i.id}')">🗑</button>
      </div>
    </div>`).join('');
}

function promoteIdeia(id){
  const i=ideias.find(x=>x.id===id);if(!i)return;
  openVideoModal();
  setTimeout(()=>{document.getElementById('vf-titulo').value=i.titulo||'';document.getElementById('vf-descricao').value=i.descricao||'';},50);
  toast('Ideia carregada — revise e salve ✓');
}

// ── VIDEO MODAL ──
function toggleManualPeriod(){
  const dl=document.getElementById('vf-deadline').value;
  document.getElementById('vf-manual-period').style.display=dl?'none':'block';
}

function openVideoModal(id,defaultStatus,defaultDate){
  editingVideoId=id||null;
  const v=id?videos.find(x=>x.id===id):null;
  document.getElementById('vm-title').textContent=v?'Editar vídeo':'Novo vídeo';
  document.getElementById('vbtn-del').style.display=v?'inline-flex':'none';
  document.getElementById('vf-titulo').value=v?.titulo||'';
  document.getElementById('vf-objetivo').value=v?.objetivo||'';
  document.getElementById('vf-descricao').value=v?.descricao||'';
  document.getElementById('vf-nivel').value=String(v?.nivel||1);
  document.getElementById('vf-tipo').value=v?.tipo||'Reels';
  document.getElementById('vf-mes').value=v?.mes||currentMonth;
  document.getElementById('vf-ano').value=String(v?.ano||currentYear);
  document.getElementById('vf-status').value=v?.status||defaultStatus||'Backlog';
  document.getElementById('vf-deadline').value=v?.deadline||defaultDate||'';
  toggleManualPeriod();
  document.getElementById('ov-video').classList.add('open');
  setTimeout(()=>document.getElementById('vf-titulo').focus(),120);
}

document.getElementById('vf-deadline').addEventListener('change',toggleManualPeriod);

function openVideoModalOnDate(ds){
  const[y,m]=ds.split('-');
  openVideoModal(null,'Backlog',ds);
  document.getElementById('vf-mes').value=MONTHS_S[parseInt(m)-1]||currentMonth;
  document.getElementById('vf-ano').value=y||String(currentYear);
}

function closeVideoModal(){document.getElementById('ov-video').classList.remove('open');editingVideoId=null;}

async function saveVideo(){
  const titulo=document.getElementById('vf-titulo').value.trim();
  if(!titulo){toast('Preencha o título!');return;}
  const dl=document.getElementById('vf-deadline').value||null;
  let mes,ano;
  if(dl){const ma=mesAnoFromDeadline(dl);mes=ma.mes;ano=ma.ano;}
  else{mes=document.getElementById('vf-mes').value;ano=parseInt(document.getElementById('vf-ano').value);}
  const body={titulo,objetivo:document.getElementById('vf-objetivo').value.trim()||null,descricao:document.getElementById('vf-descricao').value.trim()||null,nivel:parseInt(document.getElementById('vf-nivel').value),tipo:document.getElementById('vf-tipo').value,mes,ano,status:document.getElementById('vf-status').value,deadline:dl};
  try{
    if(editingVideoId)await api('PATCH',`videos?id=eq.${editingVideoId}`,body);
    else await api('POST','videos',body);
    toast(editingVideoId?'Vídeo atualizado ✓':'Vídeo criado ✓');
    closeVideoModal();await load();
  }catch(e){toast('Erro ao salvar: '+e.message);console.error(e);}
}

async function deleteVideo(){
  if(!editingVideoId||!confirm('Excluir este vídeo? Não tem como desfazer.'))return;
  try{await api('DELETE',`videos?id=eq.${editingVideoId}`);toast('Vídeo excluído');closeVideoModal();await load();}
  catch(e){toast('Erro ao excluir');console.error(e);}
}

// ── SPECIAL MODAL ──
function buildColorOpts(){
  document.getElementById('color-opts').innerHTML=SPECIAL_COLORS.map(c=>`<div class="copt${c===selectedColor?' sel':''}" style="background:${c}" onclick="selectColor('${c}')" data-c="${c}"></div>`).join('');
}
function selectColor(c){selectedColor=c;document.querySelectorAll('.copt').forEach(el=>el.classList.toggle('sel',el.dataset.c===c));}

function openSpecialModal(id,defaultDate){
  editingSpecialId=id||null;
  const s=id?specials.find(x=>x.id===id):null;
  document.getElementById('sm-title').textContent=s?'Editar data especial':'Nova data especial';
  document.getElementById('sbtn-del').style.display=s?'inline-flex':'none';
  document.getElementById('sf-data').value=normDate(s?.data)||defaultDate||'';
  document.getElementById('sf-titulo').value=s?.titulo||'';
  selectedColor=s?.cor||SPECIAL_COLORS[0];
  buildColorOpts();
  document.getElementById('ov-special').classList.add('open');
  setTimeout(()=>document.getElementById('sf-titulo').focus(),120);
}
function closeSpecialModal(){document.getElementById('ov-special').classList.remove('open');editingSpecialId=null;}

async function saveSpecial(){
  const data=document.getElementById('sf-data').value;
  const titulo=document.getElementById('sf-titulo').value.trim();
  if(!data||!titulo){toast('Preencha data e título!');return;}
  const body={data,titulo,cor:selectedColor};
  try{
    if(editingSpecialId)await api('PATCH',`datas_especiais?id=eq.${editingSpecialId}`,body);
    else await api('POST','datas_especiais',body);
    toast(editingSpecialId?'Data atualizada ✓':'Data especial criada ✓');
    closeSpecialModal();await load();
  }catch(e){toast('Erro ao salvar: '+e.message);console.error(e);}
}

async function deleteSpecial(){
  if(!editingSpecialId||!confirm('Excluir esta data especial?'))return;
  try{await api('DELETE',`datas_especiais?id=eq.${editingSpecialId}`);toast('Data excluída');closeSpecialModal();await load();}
  catch(e){toast('Erro ao excluir');console.error(e);}
}

// ── IDEA MODAL ──
function openIdeaModal(id){
  editingIdeaId=id||null;
  const i=id?ideias.find(x=>x.id===id):null;
  document.getElementById('im-title').textContent=i?'Editar ideia':'Nova ideia';
  document.getElementById('ibtn-del').style.display=i?'inline-flex':'none';
  document.getElementById('if-titulo').value=i?.titulo||'';
  document.getElementById('if-descricao').value=i?.descricao||'';
  document.getElementById('if-link').value=i?.link||'';
  document.getElementById('ov-idea').classList.add('open');
  setTimeout(()=>document.getElementById('if-titulo').focus(),120);
}
function closeIdeaModal(){document.getElementById('ov-idea').classList.remove('open');editingIdeaId=null;}

async function saveIdeia(){
  const titulo=document.getElementById('if-titulo').value.trim();
  if(!titulo){toast('Preencha o título!');return;}
  const body={titulo,descricao:document.getElementById('if-descricao').value.trim()||null,link:document.getElementById('if-link').value.trim()||null};
  try{
    if(editingIdeaId)await api('PATCH',`ideias?id=eq.${editingIdeaId}`,body);
    else await api('POST','ideias',body);
    toast(editingIdeaId?'Ideia atualizada ✓':'Ideia salva ✓');
    closeIdeaModal();await load();
  }catch(e){toast('Erro ao salvar: '+e.message);console.error(e);}
}

async function deleteIdeiaConfirm(){
  if(!editingIdeaId||!confirm('Excluir esta ideia?'))return;
  try{await api('DELETE',`ideias?id=eq.${editingIdeaId}`);toast('Ideia excluída');closeIdeaModal();await load();}
  catch(e){toast('Erro ao excluir');console.error(e);}
}

async function deleteIdeiaById(id){
  if(!confirm('Excluir esta ideia?'))return;
  try{await api('DELETE',`ideias?id=eq.${id}`);toast('Ideia excluída');await load();}
  catch(e){toast('Erro ao excluir');console.error(e);}
}

// ── VIEWS / FILTERS ──
function showView(v){
  currentView=v;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+v).classList.add('active');
  document.getElementById('topbar-title').textContent={kanban:'Kanban',calendar:'Calendário',ideas:'Lista de Ideias'}[v];
  document.getElementById('fstrip').style.display=v==='kanban'?'flex':'none';
  if(v==='kanban')renderKanban();
  else if(v==='calendar')renderCalendar();
  else renderIdeas();
  document.getElementById('sidebar').classList.remove('mob-open');
  document.getElementById('sb-overlay').classList.remove('mob-open');
}

function setLevel(l){currentLevel=l;document.querySelectorAll('[id^="lv-"]').forEach(b=>b.classList.remove('active'));document.getElementById('lv-'+l).classList.add('active');renderKanban();}
function setTipo(t){
  currentTipo=t;
  document.querySelectorAll('[id^="tp-"]').forEach(b=>b.classList.remove('active'));
  const safeId='tp-'+(t==='YT Shorts'?'YTShorts':t);
  const el=document.getElementById(safeId);if(el)el.classList.add('active');
  renderKanban();
}

function toggleMob(){
  document.getElementById('sidebar').classList.toggle('mob-open');
  document.getElementById('sb-overlay').classList.toggle('mob-open');
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeVideoModal();closeSpecialModal();closeIdeaModal();}});
['ov-video','ov-special','ov-idea'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{
    if(e.target!==e.currentTarget)return;
    if(id==='ov-video')closeVideoModal();
    else if(id==='ov-special')closeSpecialModal();
    else closeIdeaModal();
  });
});

function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2800);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

setInterval(load,10000);
load();
</script>
